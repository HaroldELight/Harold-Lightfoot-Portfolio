{% extends "base.html" %}

{% block title %}Server Error - Email Bot{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="text-center py-5">
            <div class="mb-4">
                <i class="fas fa-exclamation-circle fa-5x text-danger"></i>
            </div>
            <h1 class="display-4">500</h1>
            <h2 class="mb-3">Server Error</h2>
            <p class="lead mb-4">
                Sorry, something went wrong on our end. We're working to fix it.
            </p>
            <div class="d-flex justify-content-center gap-2">
                <a href="{{ url_for('index') }}" class="btn btn-primary">
                    <i class="fas fa-home"></i> Go Home
                </a>
                <a href="{{ url_for('emails') }}" class="btn btn-outline-primary">
                    <i class="fas fa-envelope"></i> View Emails
                </a>
                <a href="{{ url_for('chat') }}" class="btn btn-outline-info">
                    <i class="fas fa-comments"></i> Chat with AI
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
